name: Hexo Deploy

on:
  push:
    branches:
      - source # 确保你的源码分支名确实是 source

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        # 升级到 v4 以支持最新的 Node 运行环境
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        # 升级到 v4 并改用 Node 24 (2026年主流版本)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install

      - name: Deploy
        env:
          # 确保你在 Secrets 里配置的名字和这里一致
          HEXO_DEPLOY_KEY: ${{ secrets.HEXO_DEPLOY_PRI }}
        run: |
          git config --global user.name "fly48432"
          git config --global user.email "fly48432@gmail.com"
          
          # 这里的替换逻辑加入了 .git 后缀兼容性处理
          # 它会把你 _config.yml 里的 repo 地址临时替换为带 Token 的地址
          sed -i "s|https://github.com/fly48432/fly48432.github.io|https://${HEXO_DEPLOY_KEY}@github.com/fly48432/fly48432.github.io.git|g" _config.yml
          
          npx hexo clean
          npx hexo deploy