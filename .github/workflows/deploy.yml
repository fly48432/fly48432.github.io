name: Hexo Deploy

on:
  push:
    branches:
      - source # 确保你的源码分支名确实是 source

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        # 升级到 v4 以支持最新的 Node 运行环境
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        # 升级到 v4 并改用 Node 24 (2026年主流版本)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install

      - name: Deploy
        env:
          HEXO_DEPLOY_PRI: ${{ secrets.HEXO_DEPLOY_PRI }}
        run: |
          git config --global user.name "fly48432"
          git config --global user.email "fly48432@gmail.com"
          
          # 更加精准的匹配：直接替换 repo: 后面直到行尾的内容
          # 这样无论你原来的地址带不带 .git，都会被替换为正确的带 Token 地址
          sed -i "s|repo:.*|repo: https://${HEXO_DEPLOY_PRI}@github.com/fly48432/fly48432.github.io.git|g" _config.yml
          
          npx hexo clean
          npx hexo deploy